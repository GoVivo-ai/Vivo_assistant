services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vivo
      POSTGRES_PASSWORD: vivo
      POSTGRES_DB: vivo_assistant
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vivo -d vivo_assistant']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Inside the compose network the DB host is "db", overriding .env
      DATABASE_URL: postgresql://vivo:vivo@db:5432/vivo_assistant?schema=public
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
